<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Loup-Garou">
<title>Loup-Garou — Ambiances</title>
<link rel="manifest" href="manifest.json">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500&display=swap');

  :root {
    --night:   #0a0a0f;
    --deep:    #12121c;
    --surface: #1a1a28;
    --rim:     #2a2a3e;
    --muted:   #4a4a6a;
    --silver:  #a0a0c0;
    --moon:    #e8e0c8;
    --gold:    #c8a84b;
    --blood:   #8b1a1a;
    --ember:   #c84b1a;
    --glow-n:  rgba(140,120,200,0.18);
    --glow-d:  rgba(200,168,75,0.18);
    --glow-e:  rgba(200,75,26,0.22);
    --fade:    3s;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%; width: 100%;
    background: var(--night);
    color: var(--silver);
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    overflow-x: hidden;
  }

  /* ── stars background ── */
  #stars {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 0%, rgba(80,60,120,0.25) 0%, transparent 70%),
      radial-gradient(ellipse 40% 30% at 80% 20%, rgba(60,50,100,0.15) 0%, transparent 60%);
  }
  #stars::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      radial-gradient(1px 1px at 15% 12%, rgba(255,255,255,0.7) 0%, transparent 100%),
      radial-gradient(1px 1px at 32% 8%,  rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 5%,  rgba(255,255,255,0.8) 0%, transparent 100%),
      radial-gradient(1px 1px at 73% 15%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 88% 7%,  rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 8%  35%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 42% 28%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 67% 22%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 91% 40%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 25% 18%, rgba(255,255,255,0.9) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 60% 10%, rgba(255,255,255,0.7) 0%, transparent 100%),
      radial-gradient(1px 1px at 78% 32%, rgba(255,255,255,0.5) 0%, transparent 100%);
  }

  /* ── moon ── */
  #moon {
    position: fixed; top: 32px; right: 48px; z-index: 1;
    width: 72px; height: 72px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #f0e8d0, #c8b880 50%, #a09060 100%);
    box-shadow: 0 0 30px 10px rgba(200,180,100,0.2), 0 0 60px 20px rgba(200,180,100,0.08);
    opacity: 0.85;
    transition: opacity 1.5s;
  }
  #moon::after {
    content: '';
    position: absolute;
    top: 12px; left: 18px;
    width: 14px; height: 12px;
    border-radius: 50%;
    background: rgba(0,0,0,0.12);
    box-shadow: 16px 8px 0 rgba(0,0,0,0.08), 8px 22px 0 rgba(0,0,0,0.06);
  }

  /* ── layout ── */
  #app {
    position: relative; z-index: 2;
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 2rem 1.25rem 3rem;
    max-width: 680px; margin: 0 auto;
  }

  /* ── header ── */
  .header { text-align: center; margin-bottom: 3rem; }
  .header-eyebrow {
    font-family: 'Inter', sans-serif;
    font-size: 11px; font-weight: 500;
    letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 0.6rem;
  }
  .header h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.8rem, 5vw, 2.6rem);
    font-weight: 700;
    color: var(--moon);
    letter-spacing: 0.06em;
    line-height: 1.1;
  }
  .header h1 span { color: var(--gold); }
  .header-sub {
    margin-top: 0.5rem;
    font-size: 13px; color: var(--muted);
    letter-spacing: 0.04em;
  }

  /* ── scene cards ── */
  .scenes { width: 100%; display: flex; flex-direction: column; gap: 1rem; }

  .scene-card {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--rim);
    border-radius: 16px;
    overflow: hidden;
    transition: border-color 0.4s, box-shadow 0.4s;
    cursor: pointer;
  }
  .scene-card:hover { border-color: var(--muted); }

  .scene-card.active-night  { border-color: rgba(140,120,200,0.6); box-shadow: 0 0 32px var(--glow-n); }
  .scene-card.active-day    { border-color: rgba(200,168,75,0.6);  box-shadow: 0 0 32px var(--glow-d); }
  .scene-card.active-end    { border-color: rgba(200,75,26,0.6);   box-shadow: 0 0 32px var(--glow-e); }

  .scene-header {
    display: flex; align-items: center; gap: 1rem;
    padding: 1.1rem 1.25rem;
    user-select: none;
  }

  .scene-orb {
    width: 48px; height: 48px; border-radius: 50%;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    border: 1px solid var(--rim);
    background: var(--deep);
    transition: background 0.5s, border-color 0.5s, box-shadow 0.5s;
  }
  .active-night .scene-orb { background: rgba(80,60,140,0.35); border-color: rgba(140,120,200,0.5); box-shadow: 0 0 16px var(--glow-n); }
  .active-day   .scene-orb { background: rgba(120,90,20,0.35);  border-color: rgba(200,168,75,0.5);  box-shadow: 0 0 16px var(--glow-d); }
  .active-end   .scene-orb { background: rgba(120,40,10,0.35);  border-color: rgba(200,75,26,0.5);   box-shadow: 0 0 16px var(--glow-e); }

  .scene-text { flex: 1; }
  .scene-name {
    font-family: 'Cinzel', serif;
    font-size: 17px; font-weight: 600;
    color: var(--moon); letter-spacing: 0.04em;
  }
  .scene-desc { font-size: 12px; color: var(--muted); margin-top: 3px; letter-spacing: 0.02em; }

  .scene-badge {
    font-size: 11px; font-weight: 500;
    padding: 4px 10px; border-radius: 20px;
    border: 1px solid var(--rim);
    color: var(--muted);
    background: var(--deep);
    transition: all 0.4s;
    white-space: nowrap;
  }
  .active-night .scene-badge { color: rgba(180,160,240,0.9); border-color: rgba(140,120,200,0.4); background: rgba(80,60,140,0.2); }
  .active-day   .scene-badge { color: rgba(220,190,100,0.9); border-color: rgba(200,168,75,0.4);  background: rgba(100,80,20,0.2); }
  .active-end   .scene-badge { color: rgba(240,120,60,0.9);  border-color: rgba(200,75,26,0.4);   background: rgba(100,40,10,0.2); }

  /* ── waveform animation ── */
  .wave-bars {
    display: none; align-items: flex-end; gap: 3px; height: 20px; margin-left: 4px;
  }
  .active-night .wave-bars,
  .active-day   .wave-bars,
  .active-end   .wave-bars { display: flex; }
  .wave-bars span {
    width: 3px; border-radius: 2px;
    background: var(--muted);
    animation: wave 0.8s ease-in-out infinite alternate;
  }
  .active-night .wave-bars span { background: rgba(160,140,220,0.8); }
  .active-day   .wave-bars span { background: rgba(210,178,85,0.8); }
  .active-end   .wave-bars span { background: rgba(210,100,50,0.8); }
  .wave-bars span:nth-child(1) { height: 8px;  animation-delay: 0s; }
  .wave-bars span:nth-child(2) { height: 14px; animation-delay: 0.15s; }
  .wave-bars span:nth-child(3) { height: 10px; animation-delay: 0.3s; }
  .wave-bars span:nth-child(4) { height: 16px; animation-delay: 0.1s; }
  .wave-bars span:nth-child(5) { height: 7px;  animation-delay: 0.25s; }
  @keyframes wave { from { transform: scaleY(0.4); } to { transform: scaleY(1); } }

  /* ── scene detail ── */
  .scene-detail {
    border-top: 1px solid var(--rim);
    padding: 0.85rem 1.25rem;
    background: var(--deep);
    display: none;
  }
  .scene-card.expanded .scene-detail { display: block; }

  .detail-row {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 0.6rem;
  }
  .detail-row:last-child { margin-bottom: 0; }
  .detail-label {
    font-size: 11px; color: var(--muted);
    min-width: 64px; flex-shrink: 0;
    letter-spacing: 0.04em;
  }

  input[type="file"] {
    flex: 1; font-size: 11px; color: var(--silver);
    background: transparent; border: none; outline: none;
    cursor: pointer;
  }
  input[type="file"]::file-selector-button {
    font-size: 11px; padding: 3px 10px;
    background: var(--surface); color: var(--silver);
    border: 1px solid var(--rim); border-radius: 6px;
    cursor: pointer; margin-right: 8px;
  }
  input[type="file"]::file-selector-button:hover { border-color: var(--muted); }

  .upload-ok { font-size: 11px; color: #6aaa6a; flex-shrink: 0; }

  input[type="range"] {
    flex: 1; -webkit-appearance: none; appearance: none;
    height: 4px; border-radius: 2px;
    background: var(--rim); outline: none; cursor: pointer;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 16px; height: 16px; border-radius: 50%;
    background: var(--moon); border: 1px solid var(--muted);
    cursor: pointer; transition: transform 0.1s;
  }
  input[type="range"]::-webkit-slider-thumb:active { transform: scale(1.2); }
  input[type="range"]::-moz-range-thumb {
    width: 16px; height: 16px; border-radius: 50%;
    background: var(--moon); border: 1px solid var(--muted);
    cursor: pointer;
  }
  .detail-val {
    font-size: 12px; font-weight: 500;
    color: var(--silver); min-width: 36px; text-align: right;
    font-variant-numeric: tabular-nums;
  }

  /* ── expand toggle ── */
  .expand-btn {
    width: 100%; padding: 0.4rem;
    background: none; border: none; border-top: 1px solid var(--rim);
    color: var(--muted); font-size: 11px; cursor: pointer;
    letter-spacing: 0.06em;
    display: flex; align-items: center; justify-content: center; gap: 4px;
    transition: color 0.2s, background 0.2s;
  }
  .expand-btn:hover { color: var(--silver); background: rgba(255,255,255,0.03); }
  .expand-arrow { display: inline-block; transition: transform 0.25s; font-size: 10px; }
  .scene-card.expanded .expand-arrow { transform: rotate(180deg); }

  /* ── master controls ── */
  .master {
    width: 100%; margin-top: 1.5rem;
    background: var(--surface);
    border: 1px solid var(--rim);
    border-radius: 16px;
    padding: 1rem 1.25rem;
    display: flex; flex-direction: column; gap: 0.75rem;
  }
  .master-title {
    font-size: 11px; color: var(--muted);
    letter-spacing: 0.12em; text-transform: uppercase;
  }
  .master-row { display: flex; align-items: center; gap: 10px; }
  .master-label { font-size: 12px; color: var(--muted); min-width: 60px; }
  .master-val { font-size: 12px; font-weight: 500; color: var(--silver); min-width: 36px; text-align: right; }

  .stop-btn {
    width: 100%; padding: 0.7rem;
    background: rgba(139,26,26,0.12);
    border: 1px solid rgba(139,26,26,0.35);
    border-radius: 10px;
    color: rgba(200,100,80,0.85);
    font-size: 13px; font-weight: 500; font-family: 'Inter', sans-serif;
    letter-spacing: 0.06em; cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .stop-btn:hover { background: rgba(139,26,26,0.22); border-color: rgba(200,80,60,0.5); }
  .stop-btn:active { transform: scale(0.98); }

  /* ── footer ── */
  .footer { margin-top: 2.5rem; font-size: 11px; color: var(--muted); text-align: center; letter-spacing: 0.05em; }
  .footer a { color: var(--muted); text-decoration: none; }

  /* ── responsive desktop ── */
  @media (min-width: 600px) {
    #moon { width: 90px; height: 90px; top: 40px; right: 60px; }
    #app { padding: 3rem 2rem 4rem; }
    .header { margin-bottom: 3.5rem; }
    .scene-header { padding: 1.25rem 1.5rem; }
    .scene-detail { padding: 1rem 1.5rem; }
    .master { padding: 1.25rem 1.5rem; }
  }
</style>
</head>
<body>
<div id="stars"></div>
<div id="moon"></div>

<div id="app">
  <header class="header">
    <p class="header-eyebrow">Sonorisation de partie</p>
    <h1>Loup-<span>Garou</span></h1>
    <p class="header-sub">Ambiances · Crossfade · Loop</p>
  </header>

  <div class="scenes" id="scenes"></div>

  <div class="master">
    <p class="master-title">Contrôles</p>
    <div class="master-row">
      <span class="master-label">Volume</span>
      <input type="range" min="0" max="100" value="80" step="1" id="master-vol" oninput="setMasterVol(this.value)">
      <span class="master-val" id="vol-display">80%</span>
    </div>
    <div class="master-row">
      <span class="master-label">Fondu</span>
      <input type="range" min="1" max="8" value="3" step="1" id="fade-slider" oninput="setFade(this.value)">
      <span class="master-val" id="fade-display">3s</span>
    </div>
    <button class="stop-btn" onclick="stopAll()">
      ◼ &nbsp;Tout arrêter
    </button>
  </div>

  <p class="footer">Tap sur une scène pour démarrer · Les fichiers restent en mémoire</p>
</div>

<script>
const SCENES_DEF = [
  { id:'night', name:'La Nuit',   desc:'Tension nocturne · piano',  icon:'🌙', activeClass:'active-night' },
  { id:'day',   name:'Le Jour',   desc:'Discussion · calme',         icon:'☀️', activeClass:'active-day'   },
  { id:'end',   name:'Endgame',   desc:'Climax tendu · non-stop',    icon:'🔥', activeClass:'active-end'   },
];

let FADE_TAU = 3;
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const masterGain = audioCtx.createGain(); masterGain.gain.value = 0.8; masterGain.connect(audioCtx.destination);
const state = SCENES_DEF.map(() => ({ buf:null, src:null, gain:null, startSec:0, dur:0 }));
let currentScene = -1;

function fmt(s) {
  s = Math.round(s);
  return Math.floor(s/60) + ':' + String(s%60).padStart(2,'0');
}

function buildUI() {
  const wrap = document.getElementById('scenes');
  SCENES_DEF.forEach((sc, i) => {
    const card = document.createElement('div');
    card.className = 'scene-card'; card.id = 'card-'+i;
    card.innerHTML = `
      <div class="scene-header" onclick="triggerScene(${i})">
        <div class="scene-orb">${sc.icon}</div>
        <div class="scene-text">
          <div class="scene-name">${sc.name}
            <span class="wave-bars" aria-hidden="true">
              <span></span><span></span><span></span><span></span><span></span>
            </span>
          </div>
          <div class="scene-desc">${sc.desc}</div>
        </div>
        <span class="scene-badge" id="badge-${i}">—</span>
      </div>
      <button class="expand-btn" onclick="toggleExpand(event,${i})" aria-label="Paramètres">
        Paramètres <span class="expand-arrow">▾</span>
      </button>
      <div class="scene-detail">
        <div class="detail-row">
          <span class="detail-label">Fichier</span>
          <input type="file" accept="audio/*" onchange="loadFile(${i},this)">
          <span class="upload-ok" id="ok-${i}" style="display:none">✓ chargé</span>
        </div>
        <div class="detail-row" id="seek-row-${i}" style="display:none">
          <span class="detail-label">Départ</span>
          <input type="range" id="seek-${i}" min="0" max="100" value="0" step="1"
            oninput="updateSeek(${i},this.value)">
          <span class="detail-val" id="seek-val-${i}">0:00</span>
        </div>
      </div>`;
    wrap.appendChild(card);
  });
}

function toggleExpand(e, i) {
  e.stopPropagation();
  document.getElementById('card-'+i).classList.toggle('expanded');
}

function loadFile(idx, input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    audioCtx.decodeAudioData(e.target.result, buf => {
      state[idx].buf = buf;
      state[idx].dur = buf.duration;
      state[idx].startSec = 0;
      document.getElementById('ok-'+idx).style.display = 'inline';
      const sl = document.getElementById('seek-'+idx);
      sl.max = Math.floor(buf.duration); sl.value = 0;
      document.getElementById('seek-val-'+idx).textContent = '0:00';
      document.getElementById('seek-row-'+idx).style.display = 'flex';
    });
  };
  reader.readAsArrayBuffer(file);
}

function updateSeek(idx, val) {
  state[idx].startSec = parseInt(val);
  document.getElementById('seek-val-'+idx).textContent = fmt(val);
  if (currentScene === idx && state[idx].src) restartAt(idx);
}

function restartAt(idx) {
  const s = state[idx]; if (!s.buf || !s.gain) return;
  try { s.src.stop(); } catch(e) {}
  const src = audioCtx.createBufferSource();
  src.buffer = s.buf; src.loop = true; src.connect(s.gain);
  src.start(0, s.startSec); s.src = src;
}

function setStatus(idx, txt, active) {
  const card = document.getElementById('card-'+idx);
  const base = 'scene-card' + (card.classList.contains('expanded') ? ' expanded' : '');
  card.className = base + (active ? ' '+SCENES_DEF[idx].activeClass : '');
  document.getElementById('badge-'+idx).textContent = txt;
}

function triggerScene(idx) {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const s = state[idx];
  if (!s.buf) {
    setStatus(idx, 'charge !', false);
    setTimeout(() => setStatus(idx, '—', false), 1500);
    return;
  }
  const now = audioCtx.currentTime;
  for (let i = 0; i < SCENES_DEF.length; i++) {
    if (i === idx) continue;
    const si = state[i];
    if (si.gain) {
      si.gain.gain.setTargetAtTime(0, now, FADE_TAU/4);
      const g=si.gain, src=si.src; si.gain=null; si.src=null;
      setTimeout(()=>{ try{src.stop();g.disconnect();}catch(e){} }, FADE_TAU*1500);
    }
    setStatus(i, '—', false);
  }
  if (s.src) { try{s.src.stop();}catch(e){} s.src=null; }
  if (s.gain) { s.gain.disconnect(); s.gain=null; }
  const g = audioCtx.createGain(); g.gain.setValueAtTime(0, now); g.connect(masterGain);
  const src = audioCtx.createBufferSource(); src.buffer=s.buf; src.loop=true; src.connect(g);
  src.start(0, s.startSec); s.src=src; s.gain=g;
  g.gain.setTargetAtTime(1, now, FADE_TAU/4);
  currentScene = idx;
  setStatus(idx, 'montée…', true);
  setTimeout(()=>{ if(currentScene===idx) setStatus(idx,'▶ actif',true); }, FADE_TAU*1000);
}

function stopAll() {
  const now = audioCtx.currentTime;
  state.forEach((s,i)=>{
    if(s.gain) s.gain.gain.setTargetAtTime(0,now,0.4);
    const g=s.gain,src=s.src; s.gain=null; s.src=null;
    if(src) setTimeout(()=>{ try{src.stop();g.disconnect();}catch(e){} },1200);
    setStatus(i,'—',false);
  });
  currentScene=-1;
}

function setMasterVol(v) {
  masterGain.gain.setTargetAtTime(v/100, audioCtx.currentTime, 0.05);
  document.getElementById('vol-display').textContent = v+'%';
}

function setFade(v) {
  FADE_TAU = parseInt(v);
  document.getElementById('fade-display').textContent = v+'s';
}

buildUI();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}
</script>
</body>
</html>
